services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: bddk
      POSTGRES_PASSWORD: bddk
      POSTGRES_DB: bddk
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bddk"]
      interval: 5s
      retries: 5

  bddk:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      BDDK_DATABASE_URL: postgresql://bddk:bddk@db:5432/bddk
      MCP_TRANSPORT: streamable-http
      PORT: "8000"
    ports:
      - "8000:8000"

volumes:
  pgdata:
