name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: bddk
          POSTGRES_PASSWORD: bddk
          POSTGRES_DB: bddk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}
      - name: Run tests
        env:
          BDDK_TEST_DATABASE_URL: postgresql://bddk:bddk@localhost:5432/bddk_test
        run: uv run pytest tests/ -v --tb=short

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --no-dev
      - name: Verify Python imports
        run: uv run python -c "from tools import admin, analytics, bulletin, documents, search, sync; print('OK')"
      - name: Verify Dockerfiles copy tools directory
        run: |
          grep -q "COPY tools/" Dockerfile
          grep -q "COPY tools/" Dockerfile.spaces
